<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wybierz miejsce - Teatr Jura</title>
    <style>
        /* Styl całej strony */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1a1a1a;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
            margin: 0;
        }

        h1 { margin-bottom: 5px; }
        p.subtitle { color: #aaaaaa; margin-bottom: 30px; }

        /* Scena */
        .scena {
            background-color: #444;
            height: 40px;
            width: 100%;
            max-width: 400px;
            margin-bottom: 40px;
            border-radius: 5px 5px 20px 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #888;
            font-weight: bold;
            letter-spacing: 2px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }

        /* Siatka foteli */
        .sala {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 30px;
        }

        .rzad {
            display: flex;
            gap: 8px;
            justify-content: center;
        }

        .miejsce {
            width: 28px;
            height: 28px;
            border-radius: 6px 6px 3px 3px;
            transition: transform 0.1s, background-color 0.2s;
            position: relative;
        }

        .miejsce.wolne {
            background-color: #ffffff;
            cursor: pointer;
            box-shadow: 0 2px 4px rgba(255,255,255,0.2);
        }
        .miejsce.wolne:hover { transform: scale(1.15); }

        .miejsce.zajete {
            background-color: #e74c3c;
            cursor: not-allowed;
            opacity: 0.5;
        }

        .miejsce.wybrane {
            background-color: #f1c40f;
            box-shadow: 0 0 10px #f1c40f;
            transform: scale(1.1);
        }

        /* Legenda na dole */
        .legenda {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
            font-size: 14px;
            color: #ccc;
        }
        .legenda div { display: flex; align-items: center; gap: 8px; }

        /* Formularz i tekst informacyjny */
        form { text-align: center; }
        
        button {
            padding: 12px 30px;
            background-color: #f1c40f;
            color: #1a1a1a;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }
        button:hover:not(:disabled) { background-color: #d4ac0d; }
        
        #wybrane-miejsca-info {
            margin-bottom: 10px;
            font-weight: normal;
            color: #aaaaaa;
            min-height: 20px;
        }
        
        #cena-info {
            font-size: 24px;
            font-weight: bold;
            color: #ffffff;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>

    <h1>Teatr Jura</h1>
    <p class="subtitle">Wybierz miejsca na widowni na spektakl "Amonit"</p>

    <!-- Klocki graficzne na stronie -->
    <div class="scena">SCENA</div>

    <div class="sala" id="sala-teatralna"></div>

    <div class="legenda">
        <div><div class="miejsce wolne" style="width: 15px; height: 15px;"></div> Wolne</div>
        <div><div class="miejsce wybrane" style="width: 15px; height: 15px;"></div> Twój wybór</div>
        <div><div class="miejsce zajete" style="width: 15px; height: 15px;"></div> Zajęte</div>
    </div>

    <!-- Formularz łączący Frontend z Backendem (PHP) -->
    <form action="podsumowanie.php" method="POST">
        <div id="wybrane-miejsca-info">Brak wybranych miejsc</div>
        
        <!-- Tu wyświetla się cena na żywo -->
        <div id="cena-info">Do zapłaty: 0 zł</div>
        
        <!-- Niewidoczne dla usera pole, które zbiera miejsca i śle do PHP -->
        <input type="hidden" name="wybrane_miejsca" id="ukryty-input-miejsca" value="">
        
        <button type="submit" id="przycisk-rezerwacji" disabled style="opacity: 0.5; cursor: not-allowed;">Przejdź do kasy</button>
    </form>

    <script>
        // 1. GENEROWANIE SIATKI MIEJSC
        const salaContainer = document.getElementById('sala-teatralna');
        
        const liczbaRzedow = 12; 
        const miejscaWRzedzie = 8;

        for (let r = 1; r <= liczbaRzedow; r++) {
            const rzadDiv = document.createElement('div');
            rzadDiv.className = 'rzad';
            
            for (let m = 1; m <= miejscaWRzedzie; m++) {
                const miejsceDiv = document.createElement('div');
                miejsceDiv.className = 'miejsce';
                
                // Losowe "zajmowanie" miejsc (ok. 20%) dla pokazu
                if (Math.random() < 0.2) {
                    miejsceDiv.classList.add('zajete');
                } else {
                    miejsceDiv.classList.add('wolne');
                    // Nadajemy ID każdemu miejscu (np. R1-M5)
                    miejsceDiv.setAttribute('data-id', `R${r}-M${m}`);
                }
                
                rzadDiv.appendChild(miejsceDiv);
            }
            salaContainer.appendChild(rzadDiv);
        }

        // 2. LOGIKA KLIKANIA I LICZENIA CENY
        const wolneMiejsca = document.querySelectorAll('.miejsce.wolne');
        const ukrytyInput = document.getElementById('ukryty-input-miejsca');
        const infoTekst = document.getElementById('wybrane-miejsca-info');
        const cenaTekst = document.getElementById('cena-info');
        const przycisk = document.getElementById('przycisk-rezerwacji');

        // Ustaw cenę biletu w tym miejscu
        const cenaZaBilet = 80; 
        
        let wybraneLista = [];

        wolneMiejsca.forEach(miejsce => {
            miejsce.addEventListener('click', () => {
                
                // Zmiana koloru (dodanie klasy 'wybrane')
                miejsce.classList.toggle('wybrane');
                const idMiejsca = miejsce.getAttribute('data-id');

                // Aktualizacja listy miejsc w pamięci
                if (miejsce.classList.contains('wybrane')) {
                    wybraneLista.push(idMiejsca);
                } else {
                    wybraneLista = wybraneLista.filter(id => id !== idMiejsca);
                }

                // Wrzucenie wybranych miejsc do ukrytego pola (dla PHP)
                ukrytyInput.value = wybraneLista.join(',');

                // Obliczanie ceny i odblokowywanie przycisku
                if (wybraneLista.length > 0) {
                    infoTekst.innerText = "Wybrane: " + wybraneLista.join(', ');
                    
                    let suma = wybraneLista.length * cenaZaBilet;
                    cenaTekst.innerText = "Do zapłaty: " + suma + " zł";
                    
                    przycisk.disabled = false;
                    przycisk.style.opacity = "1";
                    przycisk.style.cursor = "pointer";
                } else {
                    infoTekst.innerText = "Brak wybranych miejsc";
                    cenaTekst.innerText = "Do zapłaty: 0 zł";
                    
                    przycisk.disabled = true;
                    przycisk.style.opacity = "0.5";
                    przycisk.style.cursor = "not-allowed";
                }
            });
        });
    </script>

</body>
</html>
